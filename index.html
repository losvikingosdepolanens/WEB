<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juegos Educativos para Niños</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #FF4B4B;
    --yellow: #FFD93D;
    --blue: #4B9FFF;
    --green: #52C25A;
    --purple: #9B5DE5;
    --orange: #FF8C42;
    --bg: #FFF8F0;
    --card-radius: 24px;
    --shadow: 0 8px 32px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #9B5DE5 0%, #4B9FFF 50%, #52C25A 100%);
    padding: 36px 24px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 200px; height: 200px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -40px; right: -40px;
    width: 160px; height: 160px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  .header-emoji {
    font-size: 56px;
    display: block;
    margin-bottom: 10px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 800;
    color: #fff;
    text-shadow: 0 3px 12px rgba(0,0,0,0.18);
    letter-spacing: -0.5px;
  }
  header p {
    color: rgba(255,255,255,0.88);
    font-size: 17px;
    font-weight: 600;
    margin-top: 8px;
  }

  /* WAVE */
  .wave {
    display: block;
    width: 100%;
    margin-top: -2px;
  }

  /* GRID */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 28px;
  }
  @media (max-width: 500px) {
    .grid { grid-template-columns: 1fr; }
  }

  /* CARD */
  .card {
    background: #fff;
    border-radius: var(--card-radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s;
    position: relative;
    border: 3px solid transparent;
  }
  .card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 20px 48px rgba(0,0,0,0.14);
  }
  .card.active {
    border-color: var(--card-color);
    transform: translateY(-4px);
  }

  .card-header {
    padding: 28px 28px 20px;
    display: flex;
    align-items: center;
    gap: 18px;
    background: linear-gradient(135deg, var(--card-color-light), var(--card-color-mid));
    position: relative;
  }
  .card-icon {
    font-size: 52px;
    flex-shrink: 0;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.12));
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
  }
  .card:hover .card-icon { transform: rotate(-8deg) scale(1.15); }

  .card-title-block h2 {
    font-family: 'Baloo 2', cursive;
    font-size: 22px;
    font-weight: 700;
    color: #2d2d2d;
    line-height: 1.2;
  }
  .card-title-block .tag {
    display: inline-block;
    margin-top: 5px;
    padding: 3px 12px;
    border-radius: 20px;
    background: var(--card-color);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* DESCRIPTION PANEL */
  .desc-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), padding 0.3s;
    padding: 0 28px;
  }
  .desc-panel.open {
    max-height: 400px;
    padding: 20px 28px 0;
  }
  .desc-panel p {
    color: #555;
    font-size: 15px;
    line-height: 1.7;
    font-weight: 600;
  }
  .steps {
    margin-top: 14px;
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .steps li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 14px;
    color: #444;
    font-weight: 600;
  }
  .step-num {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--card-color);
    color: #fff;
    font-size: 13px;
    font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* CARD FOOTER */
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px 22px;
  }
  .age-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px;
    font-weight: 700;
    color: #888;
  }
  .age-badge span { font-size: 16px; }

  .btn-download {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 50px;
    background: var(--card-color);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    border: none;
    cursor: pointer;
    transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s, filter 0.2s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    text-decoration: none;
  }
  .btn-download:hover {
    transform: scale(1.08);
    filter: brightness(1.08);
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }
  .btn-download:active { transform: scale(0.96); }
  .btn-download svg { flex-shrink: 0; }

  /* TOGGLE CHEVRON */
  .chevron {
    position: absolute;
    top: 18px; right: 20px;
    font-size: 20px;
    transition: transform 0.3s;
    color: rgba(0,0,0,0.35);
  }
  .card.active .chevron { transform: rotate(180deg); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #2d2d2d;
    color: #fff;
    padding: 14px 28px;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 700;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
    z-index: 100;
    display: flex; align-items: center; gap: 10px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 24px;
    color: #bbb;
    font-size: 13px;
    font-weight: 600;
  }
</style>
</head>
<body>

<header>
  <span class="header-emoji">🎓</span>
  <h1>Juegos Educativos para Niños</h1>
  <p>¡Aprende jugando! Descarga fichas para imprimir y colorear 🖨️</p>
</header>

<svg class="wave" viewBox="0 0 1440 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M0 48C240 0 480 48 720 24C960 0 1200 48 1440 24V48H0Z" fill="#FFF8F0"/>
</svg>

<main>
  <div class="grid" id="gameGrid"></div>
</main>

<div class="toast" id="toast">✅ Descarga iniciada</div>

<footer>🌈 Recursos educativos para Infantil y Primaria</footer>

<script>
const games = [
  {
    id: 1,
    title: "Sigue el Patrón de Colores",
    icon: "🐛",
    tag: "Patrones",
    age: "3-5 años",
    color: "#52C25A",
    colorLight: "#e8faea",
    colorMid: "#c8f0cc",
    description: "El niño debe identificar la secuencia de colores y completarla siguiendo el patrón que se muestra.",
    steps: [
      "Observa la secuencia de bolitas de colores en la fila superior.",
      "Identifica qué colores se repiten y en qué orden (rojo, amarillo, azul…).",
      "Colorea las bolitas vacías siguiendo ese mismo patrón.",
      "¡Comprueba que la oruga tenga todos sus colores!"
    ],
    file: "patron_colores.jpeg"
  },
  {
    id: 2,
    title: "Bolitas de Colores",
    icon: "🔴",
    tag: "Colores",
    age: "3-5 años",
    color: "#FFD93D",
    colorLight: "#fffbe8",
    colorMid: "#fff3c0",
    description: "El niño debe colocar bolitas negras (plastilina, gomets o pegatinas) en la fila que corresponde a cada color.",
    steps: [
      "Observa el color de la bolita grande al inicio de cada fila.",
      "Coge bolitas o pegatinas del mismo color.",
      "Colócalas una a una en los círculos vacíos de esa fila.",
      "¡Repite con cada color: rojo, amarillo, azul, verde y morado!"
    ],
    file: "bolitas_colores.jpeg"
  },
  {
    id: 3,
    title: "Camino de la Abeja",
    icon: "🐝",
    tag: "Grafomotricidad",
    age: "3-5 años",
    color: "#FF8C42",
    colorLight: "#fff3eb",
    colorMid: "#ffe0c8",
    description: "Fichas de trazado para trabajar la motricidad fina: el niño repasa el camino de la abeja hasta llegar a la flor.",
    steps: [
      "Coloca el lápiz sobre la abeja del dibujo.",
      "Sigue el camino amarillo sin salirte de la línea.",
      "Hay tres caminos: recto, en zig-zag suave y en zig-zag más cerrado.",
      "¡Intenta llegar a la flor sin levantar el lápiz!"
    ],
    file: "camino_abeja.jpeg"
  },
  {
    id: 4,
    title: "Rellena con Plastilina",
    icon: "🎨",
    tag: "Psicomotricidad",
    age: "3-6 años",
    color: "#9B5DE5",
    colorLight: "#f3eeff",
    colorMid: "#dfd0ff",
    description: "El niño rellena los círculos vacíos de cada maracas usando plastilina del color correspondiente.",
    steps: [
      "Observa el color de cada maracas (azul, morado, verde, naranja, amarillo, rojo).",
      "Coge un trozo de plastilina del mismo color.",
      "Haz bolitas pequeñas y rellena los círculos blancos.",
      "¡Presiona bien para que quede liso y bonito!"
    ],
    file: "rellena_plastilina.jpeg"
  }
];

const grid = document.getElementById('gameGrid');

games.forEach(g => {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.setProperty('--card-color', g.color);
  card.style.setProperty('--card-color-light', g.colorLight);
  card.style.setProperty('--card-color-mid', g.colorMid);

  card.innerHTML = `
    <div class="card-header">
      <span class="card-icon">${g.icon}</span>
      <div class="card-title-block">
        <h2>${g.title}</h2>
        <span class="tag">${g.tag}</span>
      </div>
      <span class="chevron">▾</span>
    </div>

    <div class="desc-panel" id="desc-${g.id}">
      <p>${g.description}</p>
      <ul class="steps">
        ${g.steps.map((s,i) => `
          <li>
            <div class="step-num" style="background:${g.color}">${i+1}</div>
            <span>${s}</span>
          </li>
        `).join('')}
      </ul>
    </div>

    <div class="card-footer">
      <div class="age-badge"><span>🎂</span> ${g.age}</div>
      <button class="btn-download" style="background:${g.color}" data-file="${g.file}" data-title="${g.title}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Descargar
      </button>
    </div>
  `;

  // Toggle description
  const header = card.querySelector('.card-header');
  const panel = card.querySelector('.desc-panel');
  header.addEventListener('click', (e) => {
    if (e.target.closest('.btn-download')) return;
    const isOpen = panel.classList.contains('open');
    // Close all
    document.querySelectorAll('.desc-panel').forEach(p => p.classList.remove('open'));
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    if (!isOpen) {
      panel.classList.add('open');
      card.classList.add('active');
    }
  });

  // Download button
  const btn = card.querySelector('.btn-download');
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    showToast(`⬇️ Descargando "${g.title}"`);
    // In a real app, this would link to the actual file
    // For demo, we generate a simple SVG placeholder
    downloadPlaceholder(g);
  });

  grid.appendChild(card);
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function downloadPlaceholder(g) {
  // Create a simple SVG placeholder for demo purposes
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
    <rect width="800" height="600" fill="${g.colorLight}" rx="20"/>
    <rect x="20" y="20" width="760" height="560" rx="16" fill="none" stroke="${g.color}" stroke-width="4" stroke-dasharray="12,6"/>
    <text x="400" y="200" font-family="Arial" font-size="80" text-anchor="middle">${g.icon}</text>
    <text x="400" y="280" font-family="Arial" font-size="32" font-weight="bold" fill="${g.color}" text-anchor="middle">${g.title}</text>
    <text x="400" y="340" font-family="Arial" font-size="18" fill="#666" text-anchor="middle">Ficha educativa · ${g.tag} · ${g.age}</text>
    <text x="400" y="410" font-family="Arial" font-size="15" fill="#aaa" text-anchor="middle">⚠️ Reemplaza este archivo por la imagen real:</text>
    <text x="400" y="445" font-family="Arial" font-size="14" fill="#bbb" text-anchor="middle">${g.file}</text>
  </svg>`;

  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = g.file.replace('.jpeg', '.svg');
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
